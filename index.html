<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Universal Security Module • Roblox Dev Security</title>

  <!-- SEO -->
  <meta name="description" content="Universal Security Module v2026.2 — Advanced Roblox server-side anti-exploit & physics security." />
  <meta name="author" content="civ" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph -->
  <meta property="og:title" content="Universal Security Module" />
  <meta property="og:description" content="Server-authoritative anti-exploit framework for Roblox developers." />
  <meta property="og:type" content="website" />

  <!-- FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <!-- REACT -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, system-ui, sans-serif;
      color: #e5e7eb;
      background:
        radial-gradient(900px 420px at 50% 18%, rgba(99,102,241,0.22), transparent 60%),
        linear-gradient(180deg, #020617, #020617);
      min-height: 100vh;
    }

    header {
      padding: 28px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    header h1 { font-size: 20px; font-weight: 800; letter-spacing: 0.04em; }
    header span { color: #6366f1; }
    .glow { color: #6366f1; text-shadow: 0 0 18px rgba(99,102,241,0.6); }

    /* NAVIGATION */
    .nav {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      justify-content: center;
      gap: 28px;
      padding: 14px 24px;
      background: rgba(2,6,23,0.75);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 40px;
    }

    .nav a {
      position: relative;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #9ca3af;
      padding: 6px 4px;
      transition: color 0.2s ease;
    }

    .nav a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -6px;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, rgba(99,102,241,0), rgba(99,102,241,0.8), rgba(99,102,241,0));
      opacity: 0;
      transform: scaleX(0.6);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .nav a:hover { color: #e5e7eb; }
    .nav a:hover::after { opacity: 1; transform: scaleX(1); }
    .nav a.active { color: #a5b4fc; }
    .nav a.active::after { opacity: 1; transform: scaleX(1); }

    main { max-width: 1100px; margin: auto; padding: 32px; }

    .hero { text-align: center; margin-bottom: 96px; }
    .hero h2 { font-size: clamp(36px, 6vw, 64px); font-weight: 800; margin-bottom: 24px; line-height: 1.1; }
    .hero p { font-size: 18px; color: #9ca3af; max-width: 700px; margin: auto; }

    .tag {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(99,102,241,0.15);
      color: #a5b4fc;
      font-size: 13px;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 28px;
      transition: transform 0.25s ease, border-color 0.25s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: rgba(99,102,241,0.6);
    }

    .card h3 { font-size: 20px; margin-bottom: 12px; }
    .card p { color: #9ca3af; font-size: 15px; line-height: 1.5; }

    .cta {
      margin-top: 60px;
      text-align: center;
    }

    .cta a {
      display: inline-block;
      padding: 14px 28px;
      font-weight: 600;
      color: #e5e7eb;
      background: #6366f1;
      border-radius: 12px;
      text-decoration: none;
      transition: background 0.2s ease;
    }

    .cta a:hover {
      background: #4f46e5;
    }

    .notice {
      margin-top: 64px;
      font-size: 14px;
      color: #9ca3af;
      text-align: center;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.6;
    }

    footer {
      padding: 48px 32px;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.05);
      color: #6b7280;
      font-size: 14px;
    }

    .hero-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 32px;
    }

    .btn-primary, .btn-secondary {
      padding: 14px 28px;
      font-weight: 600;
      border-radius: 12px;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: #6366f1;
      color: #e5e7eb;
    }

    .btn-primary:hover {
      background: #4f46e5;
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: #e5e7eb;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.3);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 24px;
      margin-bottom: 64px;
    }

    .stat {
      text-align: center;
      padding: 24px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 800;
      color: #a5b4fc;
      margin-bottom: 8px;
    }

    .stat-label {
      font-size: 14px;
      color: #9ca3af;
    }

    .section-title {
      text-align: center;
      margin-bottom: 40px;
    }

    .section-title h3 {
      font-size: 28px;
      font-weight: 700;
      color: #e5e7eb;
    }

    .quick-start {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 24px;
      margin-bottom: 64px;
    }

    .step {
      display: flex;
      gap: 16px;
      padding: 24px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
    }

    .step-number {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(99,102,241,0.2);
      color: #a5b4fc;
      border-radius: 10px;
      font-weight: 700;
      font-size: 18px;
      flex-shrink: 0;
    }

    .step-content h4 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #e5e7eb;
    }

    .step-content p {
      font-size: 14px;
      color: #9ca3af;
      line-height: 1.5;
    }

    .why-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      margin-bottom: 64px;
    }

    .why-item {
      padding: 24px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
    }

    .why-item h4 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #e5e7eb;
    }

    .why-item p {
      font-size: 14px;
      color: #9ca3af;
      line-height: 1.6;
    }

    .cta-sub {
      margin-top: 12px;
      font-size: 14px;
      color: #9ca3af;
    }
  </style>
</head>

<script>

  return e('div', null,
    e('section', { className: 'hero' },
      e('div', { className: 'tag' }, 'v2026.2 • MIT LICENSED'),
      e('h2', null, 'Universal Security Module'),

      ),
      e('div', { className: 'hero-buttons' },
        e('a', { className: 'btn-primary', href: 'download.html' }, 'Get Started'),
        e('a', { className: 'btn-secondary', href: 'docs.html' }, 'Documentation')
      )
    ),

    e('section', { className: 'stats' },
      stat('Modular Architecture', '6+ Components'),
      stat('Detection Methods', '15+ Checks'),
      stat('Server Authority', '100% Server-Side'),
      stat('Ban Integration', 'Universe-Wide')
    ),

    e('section', { className: 'section-title' },
      e('h3', null, 'Core Features')
    ),

    e('section', { className: 'grid' },
      feature('Suspicion Scoring System', 'Advanced 0-100 scoring with decay. Build evidence over time instead of immediate bans.'),
      feature('Movement Validation', 'Trajectory prediction, acceleration analysis, and pattern recognition for advanced physics validation.'),
      feature('Remote Event Protection', 'Automatic rate limiting, argument validation, and blacklist pattern detection.'),

      feature('Client-Side GUI', 'Visual loading indicators and detection alerts in bottom-right corner (optional).'),

    ),

    e('section', { className: 'section-title' },
      e('h3', null, 'Quick Start')

    e('section', { className: 'quick-start' },
      e('div', { className: 'step' },
        e('div', { className: 'step-number' }, '1'),
        e('div', { className: 'step-content' },
          e('h4', null, 'Download Modules'),
          e('p', null, 'Get all USM modules from the downloads page.')

      e('div', { className: 'step' },

          e('p', null, 'Server scripts go in ServerScriptService, client script in StarterPlayerScripts.')
        )

      e('div', { className: 'step' },
        e('div', { className: 'step-number' }, '3'),
        e('div', { className: 'step-content' },
          e('h4', null, 'Configure'),
          e('p', null, 'Edit USM_Configuration.lua to customize thresholds and behaviors.')
        )
      ),
      e('div', { className: 'step' },
        e('div', { className: 'step-number' }, '4'),
        e('div', { className: 'step-content' },
          e('h4', null, 'Test & Deploy'),
          e('p', null, 'Test with whitelist enabled, then deploy to production.')
        )
      )
    ),

    e('section', { className: 'section-title' },
      e('h3', null, 'Why USM?')
    ),

    e('section', { className: 'why-grid' },
      whyItem('Server Authority', 'All security decisions made server-side. Never trust the client.'),
      whyItem('Evidence-Based', 'Suspicion scoring builds evidence over time. No false positives from network lag.'),
      whyItem('Modular Design', 'Use only what you need. Each component is independent and configurable.'),
      whyItem('Dev Forum Aligned', 'Built on Roblox Dev Forum best practices and security documentation.'),
      whyItem('Easy Integration', 'Drop-in installation with comprehensive configuration options.'),
      whyItem('Active Development', 'Regular updates based on emerging exploit patterns.')
    ),

    e('div', { className: 'cta' },
      e('a', { href: 'download.html' }, 'Download USM v2026.2'),
      e('p', { className: 'cta-sub' }, 'MIT Licensed • Free for Commercial Use')
    ),

    e('div', { className: 'notice' },
      'USM is open-source software. Attribution is appreciated but not required. This project follows Roblox Dev Forum security best practices.'
    )
  );
}

function feature(title, desc) {
  return e('div', { className: 'card' },
    e('h3', null, title),
    e('p', null, desc)
  );
}

function stat(label, value) {
  return e('div', { className: 'stat' },
    e('div', { className: 'stat-value' }, value),
    e('div', { className: 'stat-label' }, label)
  );
}

function step(number, title, desc) {
  return e('div', { className: 'step' },
    e('div', { className: 'step-number' }, number),
    e('div', { className: 'step-content' },
      e('h4', null, title),
      e('p', null, desc)
    )
  );
}

function whyItem(title, desc) {
  return e('div', { className: 'why-item' },
    e('h4', null, title),
    e('p', null, desc)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>

</body>
</html>
