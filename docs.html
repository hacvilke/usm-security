<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Docs • USM Roblox Security</title>

  <meta name="description" content="Documentation and setup guide for Universal Security Module v2026.2 for Roblox developers." />
  <meta name="author" content="civ" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, sans-serif;
      color: #e5e7eb;
      background:
        radial-gradient(900px 420px at 50% 18%, rgba(99,102,241,0.22), transparent 60%),
        linear-gradient(180deg, #020617, #020617);
      min-height: 100vh;
    }
    header { padding: 28px 48px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
    header h1 { font-size: 20px; font-weight: 800; letter-spacing: 0.04em; }
    header span { color: #6366f1; }
    .glow { color: #6366f1; text-shadow: 0 0 18px rgba(99,102,241,0.6); }

    .nav {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      justify-content: center;
      gap: 28px;
      padding: 14px 24px;
      background: rgba(2,6,23,0.75);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 40px;
    }
    .nav a { position: relative; text-decoration: none; font-size: 14px; font-weight: 600; letter-spacing: 0.02em; color: #9ca3af; padding: 6px 4px; transition: color 0.2s ease; }
    .nav a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -6px;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, rgba(99,102,241,0), rgba(99,102,241,0.8), rgba(99,102,241,0));
      opacity: 0;
      transform: scaleX(0.6);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .nav a:hover { color: #e5e7eb; }
    .nav a:hover::after { opacity: 1; transform: scaleX(1); }
    .nav a.active { color: #a5b4fc; }
    .nav a.active::after { opacity: 1; transform: scaleX(1); }

    main { max-width: 1100px; margin: auto; padding: 32px; }

    .hero { text-align: center; margin-bottom: 64px; }
    .hero h2 { font-size: clamp(36px, 6vw, 64px); font-weight: 800; margin-bottom: 24px; line-height: 1.1; }
    .hero p { font-size: 18px; color: #9ca3af; max-width: 700px; margin: auto; }

    .tag { display: inline-block; padding: 6px 12px; border-radius: 999px; background: rgba(99,102,241,0.15); color: #a5b4fc; font-size: 13px; margin-bottom: 20px; }

    .grid { display: grid; grid-template-columns: 1fr; gap: 24px; margin-bottom: 64px; }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 28px;
      transition: transform 0.25s ease, border-color 0.25s ease;
    }
    .card:hover { transform: translateY(-6px); border-color: rgba(99,102,241,0.6); }
    .card h3 { font-size: 20px; margin-bottom: 12px; }
    .card p { color: #9ca3af; font-size: 15px; line-height: 1.5; }

    pre {
      background: rgba(255,255,255,0.08);
      padding: 16px;
      border-radius: 12px;
      overflow-x: auto;
      font-size: 14px;
      color: #d1d5db;
    }

    .notice {
      margin-top: 64px;
      font-size: 14px;
      color: #9ca3af;
      text-align: center;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.6;
    }

    footer { padding: 48px 32px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); color: #6b7280; font-size: 14px; }

    .section-title {
      text-align: center;
      margin-bottom: 40px;
    }

    .section-title h3 {
      font-size: 28px;
      font-weight: 700;
      color: #e5e7eb;
    }

    .install-steps {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 24px;
      margin-bottom: 64px;
    }

    .install-step {
      display: flex;
      gap: 16px;
      padding: 24px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
    }

    .step-number {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(99,102,241,0.2);
      color: #a5b4fc;
      border-radius: 10px;
      font-weight: 700;
      font-size: 18px;
      flex-shrink: 0;
    }

    .step-content h4 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #e5e7eb;
    }

    .step-content p {
      font-size: 14px;
      color: #9ca3af;
      line-height: 1.5;
    }

    .config-sections {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      margin-bottom: 64px;
    }

    .config-item {
      padding: 24px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
    }

    .config-item h4 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #e5e7eb;
    }

    .config-item pre {
      background: rgba(0,0,0,0.3);
      padding: 16px;
      border-radius: 8px;
      font-size: 12px;
      color: #d1d5db;
      overflow-x: auto;
    }

    .api-section {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
      margin-bottom: 64px;
    }

    .api-item {
      padding: 20px;
      background: rgba(99,102,241,0.1);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 12px;
    }

    .api-item code {
      display: block;
      font-size: 13px;
      color: #a5b4fc;
      margin-bottom: 8px;
      font-family: 'Courier New', monospace;
    }

    .api-item p {
      font-size: 14px;
      color: #9ca3af;
    }

    .practices-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
      margin-bottom: 64px;
    }

    .practice-item {
      padding: 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
    }

    .practice-item h4 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #e5e7eb;
    }

    .practice-item p {
      font-size: 14px;
      color: #9ca3af;
      line-height: 1.5;
    }

    .troubleshoot {
      max-width: 800px;
      margin: 0 auto 64px;
    }

    .troubleshoot-item {
      display: flex;
      gap: 16px;
      padding: 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      margin-bottom: 16px;
    }

    .troubleshoot-issue {
      flex: 1;
      font-weight: 600;
      color: #fca5a5;
    }

    .troubleshoot-solution {
      flex: 2;
      color: #9ca3af;
    }

    .faq {
      max-width: 800px;
      margin: 0 auto 64px;
    }

    .faq-item {
      padding: 24px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      margin-bottom: 16px;
    }

    .faq-question {
      font-weight: 600;
      color: #e5e7eb;
      margin-bottom: 12px;
    }

    .faq-answer {
      color: #9ca3af;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<header>
  <h1>USM<span>.SEC</span></h1>
  <div class="glow">Roblox Dev Security</div>
</header>

<nav class="nav">
  <a href="index.html">Home</a>
  <a href="docs.html" class="active">Docs</a>
  <a href="download.html">Download</a>
  <a href="security.html">Security</a>
  <a href="about.html">About</a>
</nav>

<main id="root"></main>

<footer>
  Universal Security Module v2026.2 • Server-Side Roblox Protection<br>
  Not affiliated with or endorsed by Roblox Corporation.
</footer>

<script>
const e = React.createElement;

function App() {
  return e('div', null,
    e('section', { className: 'hero' },
      e('div', { className: 'tag' }, 'DOCUMENTATION v2026.2'),
      e('h2', null, 'USM Documentation'),
      e('p', null,
        'Comprehensive guide for integrating and configuring Universal Security Module in your Roblox game.'
      )
    ),

    e('section', { className: 'section-title' },
      e('h3', null, 'Quick Installation')
    ),

    e('section', { className: 'install-steps' },
      e('div', { className: 'install-step' },
        e('div', { className: 'step-number' }, '1'),
        e('div', { className: 'step-content' },
          e('h4', null, 'Download Modules'),
          e('p', null, 'Download all USM modules from the download page.')
        )
      ),
      e('div', { className: 'install-step' },
        e('div', { className: 'step-number' }, '2'),
        e('div', { className: 'step-content' },
          e('h4', null, 'Place in Game'),
          e('code-block', null, `
ServerScriptService → USM_Configuration.lua
ServerScriptService → USM_Main_AntiCheat.lua
ServerScriptService → USM_Movement_Validator.lua
ServerScriptService → USM_Remote_Protection.lua
StarterPlayerScripts → USM_Client_GUI.lua
          `)
        )
      ),
      e('div', { className: 'install-step' },
        e('div', { className: 'step-number' }, '3'),
        e('div', { className: 'step-content' },
          e('h4', null, 'Configure'),
          e('p', null, 'Edit USM_Configuration.lua to customize thresholds and behaviors for your game.')
        )
      ),
      e('div', { className: 'install-step' },
        e('div', { className: 'step-number' }, '4'),
        e('div', { className: 'step-content' },
          e('h4', null, 'Test & Deploy'),
          e('p', null, 'Test with whitelist enabled, monitor logs, then deploy to production.')
        )
      )
    ),

    e('section', { className: 'section-title' },
      e('h3', null, 'Configuration Guide')
    ),

    e('section', { className: 'config-sections' },
      configSection('Punishment System', `
KickThreshold = 80      -- Suspicion score to kick player
BanThreshold = 95      -- Suspicion score to ban player
ScoreDecayRate = 0.5   -- Points lost per second
UseBanAsync = true     -- Use universe-wide bans
BanDuration = 604800   -- 7 days (nil = permanent)
      `),
      configSection('Movement Validation', `
MaxSpeedMultiplier = 2.5      -- Multiplier of WalkSpeed
MaxTeleportDistance = 50     -- Studs
MaxAirTime = 3.0             -- Seconds in air
MaxJumpHeight = 50           -- Studs
MaxAcceleration = 100        -- Studs/second²
      `),
      configSection('Remote Events', `
MaxCallsPerSecond = 20       -- Rate limit per player
MaxArgumentSize = 1000       -- Characters per argument
BlacklistedPatterns = {      -- Exploit patterns to block
    "require", "getfenv", "setfenv"
}
      `),
      configSection('Webhook Notifications', `
Enabled = false
URL = ""                     -- Your Discord webhook URL
UseProxy = true              -- Use proxy service for security
NotifyOnKick = true
NotifyOnBan = true
HighSuspicionThreshold = 70
      `)
    ),

    e('section', { className: 'section-title' },
      e('h3', null, 'API Reference')
    ),

    e('section', { className: 'api-section' },
      apiMethod('AddSuspicion(player, amount, reason)', 'Manually add suspicion to a player'),
      apiMethod('SetGracePeriod(player, graceType, duration)', 'Set a grace period for a player'),
      apiMethod('IsWhitelisted(player)', 'Check if a player is whitelisted'),
      apiMethod('SendWebhookNotification(player, eventType, details)', 'Send webhook notification')
    ),

    e('section', { className: 'section-title' },
      e('h3', null, 'Best Practices')
    ),

    e('section', { className: 'practices-list' },
      practice('Server Authority Only', 'Never trust client-side values for security decisions'),
      practice('Test Thoroughly', 'Test with whitelist enabled before production deployment'),
      practice('Monitor Logs', 'Regularly review detection logs for false positives'),
      practice('Adjust Thresholds', 'Customize settings based on your game\'s mechanics'),
      practice('Handle Appeals', 'Provide a way for players to appeal bans'),
      practice('Stay Updated', 'Keep USM updated with latest releases')
    ),

    e('section', { className: 'section-title' },
      e('h3', null, 'Troubleshooting')
    ),

    e('section', { className: 'troubleshoot' },
      troubleshootItem('False Positives on Speed Checks', 'Increase MaxSpeedMultiplier or add grace periods for specific game mechanics'),
      troubleshootItem('Legitimate Teleports Flagged', 'Use SetGracePeriod(player, "teleport", duration) after scripted teleports'),
      troubleshootItem('Remote Events Blocked', 'Add legitimate patterns to whitelist or adjust MaxCallsPerSecond'),
      troubleshootItem('High Server Load', 'Increase detection intervals or disable non-essential modules')
    ),

    e('section', { className: 'section-title' },
      e('h3', null, 'FAQ')
    ),

    e('section', { className: 'faq' },
      faqItem('Does USM work on the client?', 'No. USM is server-side only. The client script only collects data for server verification.'),
      faqItem('Will USM ban legitimate players?', 'USM uses suspicion scoring to build evidence over time, reducing false positives from network lag.'),
      faqItem('Can I customize the detection methods?', 'Yes. All thresholds and behaviors are configurable in USM_Configuration.lua.'),
      faqItem('Does USM support universe-wide bans?', 'Yes. USM integrates with Roblox\'s BanAsync for universe-wide permanent bans.'),
      faqItem('Is USM free to use?', 'Yes. USM is MIT licensed and free for both personal and commercial use.')
    ),

    e('div', { className: 'notice' },
      'For detailed API documentation and examples, see the README.md file in the downloads package.'
    )
  );
}

function feature(title, desc) {
  return e('div', { className: 'card' },
    e('h3', null, title),
    e('p', null, desc)
  );
}

function configSection(title, code) {
  return e('div', { className: 'config-item' },
    e('h4', null, title),
    e('pre', null, code.trim())
  );
}

function apiMethod(signature, description) {
  return e('div', { className: 'api-item' },
    e('code', null, signature),
    e('p', null, description)
  );
}

function practice(title, description) {
  return e('div', { className: 'practice-item' },
    e('h4', null, title),
    e('p', null, description)
  );
}

function troubleshootItem(issue, solution) {
  return e('div', { className: 'troubleshoot-item' },
    e('div', { className: 'troubleshoot-issue' }, issue),
    e('div', { className: 'troubleshoot-solution' }, solution)
  );
}

function faqItem(question, answer) {
  return e('div', { className: 'faq-item' },
    e('div', { className: 'faq-question' }, question),
    e('div', { className: 'faq-answer' }, answer)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>

</body>
</html>
