<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Security • USM Roblox Security</title>

  <meta name="description" content="Learn about the advanced security features of Universal Security Module for Roblox servers." />
  <meta name="author" content="civ" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, sans-serif;
      color: #e5e7eb;
      background:
        radial-gradient(900px 420px at 50% 18%, rgba(99,102,241,0.22), transparent 60%),
        linear-gradient(180deg, #020617, #020617);
      min-height: 100vh;
    }
    header { padding: 28px 48px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
    header h1 { font-size: 20px; font-weight: 800; letter-spacing: 0.04em; }
    header span { color: #6366f1; }
    .glow { color: #6366f1; text-shadow: 0 0 18px rgba(99,102,241,0.6); }

    .nav {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      justify-content: center;
      gap: 28px;
      padding: 14px 24px;
      background: rgba(2,6,23,0.75);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 40px;
    }
    .nav a {
      position: relative;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #9ca3af;
      padding: 6px 4px;
      transition: color 0.2s ease;
    }
    .nav a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -6px;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, rgba(99,102,241,0), rgba(99,102,241,0.8), rgba(99,102,241,0));
      opacity: 0;
      transform: scaleX(0.6);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .nav a:hover { color: #e5e7eb; }
    .nav a:hover::after { opacity: 1; transform: scaleX(1); }
    .nav a.active { color: #a5b4fc; }
    .nav a.active::after { opacity: 1; transform: scaleX(1); }

    main { max-width: 1100px; margin: auto; padding: 32px; }

    .hero { text-align: center; margin-bottom: 64px; }
    .hero h2 { font-size: clamp(36px, 6vw, 64px); font-weight: 800; margin-bottom: 24px; line-height: 1.1; }
    .hero p { font-size: 18px; color: #9ca3af; max-width: 700px; margin: auto; }

    .tag { display: inline-block; padding: 6px 12px; border-radius: 999px; background: rgba(99,102,241,0.15); color: #a5b4fc; font-size: 13px; margin-bottom: 20px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 24px; }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 28px;
      transition: transform 0.25s ease, border-color 0.25s ease;
    }
    .card:hover { transform: translateY(-6px); border-color: rgba(99,102,241,0.6); }
    .card h3 { font-size: 20px; margin-bottom: 12px; }
    .card p { color: #9ca3af; font-size: 15px; line-height: 1.5; }

    .notice {
      margin-top: 64px;
      font-size: 14px;
      color: #9ca3af;
      text-align: center;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.6;
    }

    footer { padding: 48px 32px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); color: #6b7280; font-size: 14px; }

    .section-title {
      text-align: center;
      margin-bottom: 40px;
    }

    .section-title h3 {
      font-size: 28px;
      font-weight: 700;
      color: #e5e7eb;
    }

    .detection-layers {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      margin-bottom: 64px;
    }

    .detection-item {
      padding: 24px;
      background: rgba(99,102,241,0.1);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 16px;
    }

    .detection-item h4 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #a5b4fc;
    }

    .detection-item p {
      font-size: 14px;
      color: #9ca3af;
      line-height: 1.6;
    }

    .principles {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      margin-bottom: 64px;
    }

    .principle-item {
      padding: 24px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
    }

    .principle-item h4 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #e5e7eb;
    }

    .principle-item p {
      font-size: 14px;
      color: #9ca3af;
      line-height: 1.6;
    }

    .response-system {
      max-width: 800px;
      margin: 0 auto 64px;
    }

    .response-item {
      display: flex;
      gap: 24px;
      padding: 24px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      margin-bottom: 16px;
    }

    .response-score {
      width: 200px;
      font-weight: 700;
      color: #a5b4fc;
      flex-shrink: 0;
    }

    .response-action {
      flex: 1;
      color: #9ca3af;
    }
  </style>
</head>
<body>

<header>
  <h1>USM<span>.SEC</span></h1>
  <div class="glow">Roblox Dev Security</div>
</header>

<nav class="nav">
  <a href="index.html">Home</a>
  <a href="docs.html">Docs</a>
  <a href="download.html">Download</a>
  <a href="security.html" class="active">Security</a>
  <a href="about.html">About</a>
</nav>

<main id="root"></main>

<footer>
  Universal Security Module v2026.2 • Server-Side Roblox Protection<br>
  Not affiliated with or endorsed by Roblox Corporation.
</footer>

<script>
const e = React.createElement;

function App() {
  return e('div', null,
    e('section', { className: 'hero' },
      e('div', { className: 'tag' }, 'SECURITY ARCHITECTURE'),
      e('h2', null, 'USM Security Features'),
      e('p', null,
        'Universal Security Module provides comprehensive server-side protection with multiple layers of detection, behavioral analysis, and automated response systems.'
      )
    ),

    e('section', { className: 'section-title' },
      e('h3', null, 'Detection Layers')
    ),

    e('section', { className: 'detection-layers' },
      detectionLayer('Movement Validation', 'Trajectory prediction, acceleration analysis, and pattern recognition for physics-based exploit detection'),
      detectionLayer('Remote Protection', 'Automatic rate limiting, argument validation, and blacklist pattern detection for remote events'),
      detectionLayer('Character Analysis', 'Health overflow detection, state validation, and tool/equipment monitoring'),
      detectionLayer('Behavioral Scoring', 'Suspicion scoring system with decay to build evidence over time')
    ),

    e('section', { className: 'section-title' },
      e('h3', null, 'Advanced Features')
    ),

    e('section', { className: 'features-grid' },
      feature('Suspicion Scoring', '0-100 point system with automatic decay. Build evidence over time instead of immediate bans.'),
      feature('Webhook Notifications', 'Discord webhook integration with proxy support for real-time alerts on suspicious activity.'),
      feature('Client-Side GUI', 'Visual loading indicators and detection alerts in bottom-right corner (optional).'),
      feature('BanAsync Integration', 'Universe-wide permanent bans using Roblox\'s official ban system.'),
      feature('Grace Periods', 'Configurable grace periods for teleports, respawns, and scripted events.'),
      feature('Whitelist System', 'User ID, group ID, and game pass whitelisting for trusted players.')
    ),

    e('section', { className: 'section-title' },
      e('h3', null, 'Security Principles')
    ),

    e('section', { className: 'principles' },
      principle('Server Authority Only', 'All security decisions made server-side. Never trust client-side values.'),
      principle('Evidence-Based Detection', 'Suspicion scoring prevents false positives from network latency.'),
      principle('Platform Aligned', 'Built on Roblox Dev Forum security documentation and best practices.'),
      principle('Performance First', 'Optimized for large servers without frame drops or increased latency.'),
      principle('Modular Design', 'Use only what you need. Each component is independent and configurable.')
    ),

    e('section', { className: 'section-title' },
      e('h3', null, 'Response System')
    ),

    e('section', { className: 'response-system' },
      responseItem('Suspicion Score 0-49', 'Monitoring only. No action taken.'),
      responseItem('Suspicion Score 50-79', 'Increased monitoring. Webhook alerts if enabled.'),
      responseItem('Suspicion Score 80-94', 'Player kicked with reason. Cooldown applied.'),
      responseItem('Suspicion Score 95-100', 'Player banned via BanAsync. Universe-wide ban.')
    ),

    e('div', { className: 'notice' },
      'USM follows Roblox Dev Forum security best practices. All detection methods are server-authoritative and designed to minimize false positives.'
    )
  );
}

function feature(title, desc) {
  return e('div', { className: 'card' },
    e('h3', null, title),
    e('p', null, desc)
  );
}

function detectionLayer(title, desc) {
  return e('div', { className: 'detection-item' },
    e('h4', null, title),
    e('p', null, desc)
  );
}

function principle(title, desc) {
  return e('div', { className: 'principle-item' },
    e('h4', null, title),
    e('p', null, desc)
  );
}

function responseItem(score, action) {
  return e('div', { className: 'response-item' },
    e('div', { className: 'response-score' }, score),
    e('div', { className: 'response-action' }, action)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>

</body>
</html>
